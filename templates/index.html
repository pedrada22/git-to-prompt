{% extends "base.html" %}

{% block title %}Git Context Builder{% endblock %}

{% block content %}
<h1>Git Context Builder</h1>

<section class="card">
  <p>Enter the repository and, if needed, credentials for cloning.</p>

  {% if error %}
    <div class="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ request.url_for('connect') }}" class="stack-form">
    <label for="repo_url">Git repository URL</label>
    <input id="repo_url" name="repo_url" type="text" required placeholder="https://github.com/org/repo.git">

    <label for="branch">Branch (optional)</label>
    <input id="branch" name="branch" type="text" placeholder="main">

    <label for="username">Username (optional)</label>
    <input id="username" name="username" type="text" placeholder="username">

    <label for="password">Token/Password (optional)</label>
    <input id="password" name="password" type="password" placeholder="ghp_...">
    <p class="muted">For private repositories, prefer a personal access token.</p>

    <button type="submit" class="button">Connect and list files</button>
  </form>
</section>
{% endblock %}
