<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Git Context Builder{% endblock %}</title>
  <link rel="stylesheet" href="{{ request.url_for('static', path='styles.css') }}">
</head>
<body data-page="{{ page | default('') }}">
  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ request.url_for('static', path='app.js') }}" defer></script>
</body>
</html>
